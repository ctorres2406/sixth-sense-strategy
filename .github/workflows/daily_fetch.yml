name: Daily March Madness Data Fetch

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scrape_mode:
        description: 'Set to "historical" to run full ATS scrape (run once only)'
        required: false
        default: 'daily'

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas beautifulsoup4 lxml

      - name: Fetch ESPN scores + odds + momentum
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Scrape ATS game logs
        env:
          SCRAPE_MODE: ${{ github.event.inputs.scrape_mode || 'daily' }}
        run: python scripts/scrape_ats.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: data refresh $(date -u +%Y-%m-%d)"
          git push
