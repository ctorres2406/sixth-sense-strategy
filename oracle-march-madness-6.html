  :root {
    --neon: #00FF41;

    --bg: #050505;
    --glass: rgba(14,14,14,0.75);

  * { box-sizing: border-box; }

    background: var(--bg);

    overflow-x: hidden;

  h1,h2,h3,h4,.font-display { font-family: 'Clash Display', sans-serif; }

  .glow-magenta { box-shadow: 0 0 30px rgba(255,0,110,0.2); }
  .text-glow { text-shadow: 0 0 20px rgba(0,255,65,0.4); }
  .text-glow-m { text-shadow: 0 0 20px rgba(255,0,110,0.4); }

  /* ── GLASS ── */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ── ANIMATED GRADIENT BORDER ── */
  .gradient-border {
    position: relative;
    overflow: hidden;
  }
  .gradient-border::before {
    content: '';
    position: absolute;
    inset: 0;
    padding: 1px;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--neon), transparent 40%, transparent 60%, var(--magenta));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ── SCANNING LINE ── */
  .scan-line::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,65,0.04), transparent);
    animation: scan 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes scan { 0%{left:-50%} 100%{left:150%} }

  /* ── PULSE RING ── */
  .pulse-ring {
    position: relative;
  }
  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--neon);
    opacity: 0;
    animation: ring-pulse 2s ease-out infinite;
  }
  @keyframes ring-pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ── CONFIDENCE BAR ── */
  .conf-bar {
    height: 3px;
    border-radius: 2px;
    background: #1a1a1a;
    overflow: hidden;
  }
  .conf-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    background: linear-gradient(90deg, var(--neon), #00cc33);
  }
  .conf-fill.high { background: linear-gradient(90deg, var(--neon), #00ff88); }
  .conf-fill.med  { background: linear-gradient(90deg, #ffa500, #ffcc00); }
  .conf-fill.low  { background: linear-gradient(90deg, var(--magenta), #ff4488); }

  /* ── SMOOTH ENTRANCE ANIMATIONS ── */
  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up-delay-1 { animation-delay: 0.08s; }
  .fade-up-delay-2 { animation-delay: 0.16s; }
  .fade-up-delay-3 { animation-delay: 0.24s; }
  .fade-up-delay-4 { animation-delay: 0.32s; }
  .fade-up-delay-5 { animation-delay: 0.40s; }
  .fade-up-delay-6 { animation-delay: 0.48s; }

  /* ── SLIDE IN ── */
  .slide-in-left {
    opacity: 0; transform: translateX(-30px);
    animation: slideInL 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  .slide-in-right {
    opacity: 0; transform: translateX(30px);
    animation: slideInR 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes slideInL { to { opacity:1; transform:translateX(0); } }
  @keyframes slideInR { to { opacity:1; transform:translateX(0); } }

  /* ── COUNTER ROLL ── */
  .counter-roll {
    display: inline-block;
    animation: counterRoll 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes counterRoll {
    0% { transform: translateY(100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* ── TICKER SCROLL ── */
  .ticker-track {
    display: flex;
    animation: ticker 30s linear infinite;
    width: max-content;
  }
  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .tab-active {
    color: var(--neon);
    border-bottom: 2px solid var(--neon);
  }

  /* ── BET BUTTON HOVER ── */
  .bet-btn {
    transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  }
  .bet-btn:hover {
    background: rgba(0,255,65,0.08);
    border-color: rgba(0,255,65,0.4);
    transform: translateY(-1px);
  }
  .bet-btn:active { transform: scale(0.97); }
  .bet-btn.selected {
    background: rgba(0,255,65,0.12);
    border-color: var(--neon);
    box-shadow: 0 0 15px rgba(0,255,65,0.15);
  }

  /* ── CIRCULAR GAUGE ── */
  .gauge-ring {
    transition: stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1);
  }

  /* ── MESH BG ── */
  .bg-mesh {
    background-image:

  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

  /* ── BRACKET CONNECTOR ── */
  .bracket-line {
    position: absolute;
    border-color: rgba(255,255,255,0.08);
  }

  .num-tick {
    display: inline-block;

    height: 1em;
    line-height: 1;
  }
  .num-tick span {
    display: block;

  @keyframes numTick {
    0% { transform: translateY(-100%); opacity: 0; }

  .card-lift {

  .card-lift:hover {
    transform: translateY(-2px);

  .shimmer {
    background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;

    0% { background-position: 200% 0; }

function teamLogo(name, size=24) {
  const key = norm(name);
  const id = ESPN_IDS[key];
  if (!id) return `<div class="rounded-full bg-zinc-800 flex items-center justify-center shrink-0 overflow-hidden" style="width:${size}px;height:${size}px;">
    <span class="text-[8px] font-bold text-zinc-500 uppercase">${(name||'?').substring(0,2)}</span>
  </div>`;
  return `<img src="https://a.espncdn.com/i/teamlogos/ncaa/500/${id}.png"
    alt="${name}" style="width:${size}px;height:${size}px;"
    class="rounded-full bg-zinc-800 shrink-0 object-contain"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">

      <span class="text-[8px] font-bold text-zinc-500 uppercase">${(name||'?').substring(0,2)}</span>
    </div>`;
}

    alt="${name}" style="width:${size}px;height:${size}px;"
    class="rounded-full bg-zinc-800/60 border border-zinc-700 shrink-0 object-contain p-1"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="rounded-full bg-zinc-800/60 border border-zinc-700 items-center justify-center shrink-0" style="width:${size}px;height:${size}px;display:none">
      <span class="text-xs font-bold text-zinc-500 uppercase">${(name||'?').substring(0,3)}</span>
    </div>`;
}

// ── CSV PARSING ──────────────────────────────────────────────────────────────

function smartSplit(line) {
  const r=[]; let c='',q=false;
  for(const ch of line){ if(ch==='"')q=!q; else if(ch===','&&!q){r.push(c);c='';} else c+=ch; }
  r.push(c); return r;
}
function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const hdr = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(l => {
    const v=smartSplit(l), o={};
    hdr.forEach((h,i)=> o[h]=(v[i]||'').trim().replace(/^"|"$/g,''));
    return o;
  });
}

// ── DATA LOADING ─────────────────────────────────────────────────────────────

async function fetchCSV(url) {
  const r = await fetch(url+'?t='+Date.now());
  if(!r.ok) throw new Error('HTTP '+r.status);
  return parseCSV(await r.text());
}

async function loadData() {
  try {
    const [p,o,m] = await Promise.allSettled([
      fetchCSV(`${GITHUB_BASE}/espn_scores.csv`),
      fetchCSV(`${GITHUB_BASE}/live_odds.csv`),
      fetchCSV(`${GITHUB_BASE}/momentum_profiles.csv`),
    ]);
    if(p.status==='fulfilled'&&p.value.length>0) { S.picks=p.value; S.loaded=true; }
    if(o.status==='fulfilled') o.value.forEach(r=> { S.odds[norm(r.team||r.Team||'')]=r; });
    if(m.status==='fulfilled') m.value.forEach(r=> { S.momentum[norm(r.team||r.Team||'')]=r; });
    if(!S.loaded) throw new Error('No data');
    document.getElementById('nav-dot').className='w-1.5 h-1.5 rounded-full bg-neon animate-pulse';
    document.getElementById('nav-status').textContent='Live';
  } catch(e) {
    S.picks = demoData();
    document.getElementById('nav-dot').className='w-1.5 h-1.5 rounded-full bg-zinc-600';
    document.getElementById('nav-status').textContent='Demo';
  }
  updateNav();
  render();
}

// ── NORMALIZATION ────────────────────────────────────────────────────────────

function norm(s){ return (s||'').trim().toLowerCase().replace(/[^a-z0-9]/g,''); }
function gf(row,...keys){ for(const k of keys) if(row[k]!==undefined&&row[k]!=='') return row[k]; return ''; }
function pct(v){ const n=parseFloat(v); return isNaN(n)?0:n; }

function normalizeGame(row) {
  const t1=gf(row,'team1','home_team','Home','Team1','home');
  const t2=gf(row,'team2','away_team','Away','Team2','away');
  const s1=parseInt(gf(row,'seed1','home_seed','Seed1'))||0;
  const s2=parseInt(gf(row,'seed2','away_seed','Seed2'))||0;
  const sc1=parseInt(gf(row,'score1','home_score','Score1'))||0;
  const sc2=parseInt(gf(row,'score2','away_score','Score2'))||0;
  const region=gf(row,'region','Region','bracket_region')||'';
  const rn=parseInt(gf(row,'round','Round','round_num'))||64;
  const rk=ROUND_MAP[rn]||'R64';
  const time=gf(row,'game_time','time','Time','date','Date')||'';
  const status=gf(row,'status','Status','game_status')||'';
  const winner=gf(row,'winner','Winner','winning_team')||'';
  const mlPick=gf(row,'ml_pick','model_pick','Pick','pick','predicted_winner')||'';
  let mlConf=pct(gf(row,'ml_confidence','confidence','Confidence','win_probability'));
  if(mlConf>0&&mlConf<=1) mlConf=mlConf*100;
  const mlOdds=gf(row,'ml_odds','odds','Odds')||'';
  const spread=gf(row,'spread','Spread','line')||'';
  const atsPick=gf(row,'ats_pick','ATS','ats','spread_pick')||'';
  let atsConf=pct(gf(row,'ats_confidence','ats_conf','ATS_Confidence'));
  if(atsConf>0&&atsConf<=1) atsConf=atsConf*100;

  const isFinal=/final|completed|closed/i.test(status)||(sc1>0&&sc2>0&&!!winner);
  const isLive=/live|in.?progress|halftime/i.test(status);
  let mlRes='pending', atsRes='pending';
  if(isFinal&&winner){
    mlRes=norm(winner)===norm(mlPick)?'win':'loss';
    if(atsPick){
      const sn=parseFloat((spread||'').replace(/[^-\d.]/g,''))||0;
      const pi=norm(atsPick).startsWith(norm(t1).slice(0,5));
      const mg=pi?(sc1-sc2):(sc2-sc1);
      atsRes=mg+sn>0?'win':mg+sn===0?'push':'loss';
    }
  }
  const pickSeed=norm(mlPick)===norm(t1)?s1:s2;
  const oppSeed=norm(mlPick)===norm(t1)?s2:s1;
  const isUpset=pickSeed>oppSeed&&!!mlPick;

  // Implied probability & edge from ml_odds
  let impliedPct=null, edgePct=null;
  if(mlOdds){
    const o=parseInt(mlOdds.replace(/[^-\d]/g,''))||0;
    if(o>0) impliedPct=Math.round(100/(o+100)*100);
    else if(o<0) impliedPct=Math.round(Math.abs(o)/(Math.abs(o)+100)*100);
    if(impliedPct!==null) edgePct=Math.round(mlConf-impliedPct);
  }

  return {t1,t2,s1,s2,sc1,sc2,region,rk,rn,time,status,winner,
    mlPick,mlConf,mlOdds,spread,atsPick,atsConf,impliedPct,edgePct,
    isFinal,isLive,isPending:!isFinal&&!isLive,mlRes,atsRes,isUpset,pickSeed,oppSeed};
}

function games(){ return S.picks.map(normalizeGame); }

// ── STATS ────────────────────────────────────────────────────────────────────

function stats(gg) {
  if(!gg) gg=games();
  const done=gg.filter(g=>g.isFinal);
  const mw=done.filter(g=>g.mlRes==='win').length;
  const ml=done.filter(g=>g.mlRes==='loss').length;
  const aw=done.filter(g=>g.atsRes==='win').length;
  const al=done.filter(g=>g.atsRes==='loss').length;
  const ap=done.filter(g=>g.atsRes==='push').length;
  const tot=mw+ml;
  const pctW=tot>0?(mw/tot*100):0;
  // streak
  let streak=0, streakType='';
  for(let i=done.length-1;i>=0;i--){
    if(i===done.length-1) streakType=done[i].mlRes;
    if(done[i].mlRes===streakType) streak++; else break;
  }
  return {mw,ml,aw,al,ap,tot,pctW,streak,streakType,done:done.length,total:gg.length,live:gg.filter(g=>g.isLive).length,pending:gg.filter(g=>g.isPending).length};
}

function updateNav(){
  const s=stats();
  document.getElementById('nav-record').textContent=s.tot>0?`${s.mw}-${s.ml} (${s.pctW.toFixed(0)}%)`:'--';
}

// ── RENDERING ────────────────────────────────────────────────────────────────

function setView(v){
  S.view=v;
  document.querySelectorAll('.nav-link').forEach(el=>{
    el.classList.toggle('text-neon', el.id==='nav-'+v);
    el.classList.toggle('text-zinc-500', el.id!=='nav-'+v);
  });
  render();
}

function render(){
  const app=document.getElementById('app');
  switch(S.view){
    case 'dashboard': app.innerHTML=renderDashboard(); break;
    case 'picks':     app.innerHTML=renderPicks(); break;
    case 'bestbets':  app.innerHTML=renderBestBets(); break;
    case 'upsets':    app.innerHTML=renderUpsets(); break;
    case 'bracket':   app.innerHTML=renderBracket(); break;
    case 'scores':    app.innerHTML=renderScores(); break;
  }
  // Trigger entrance animations
  requestAnimationFrame(()=>{
    app.querySelectorAll('.conf-fill').forEach(el=>{
      const w=el.dataset.width;
      if(w) el.style.width=w+'%';
    });
    app.querySelectorAll('.gauge-ring').forEach(el=>{
      const v=parseFloat(el.dataset.value)||0;
      const circ=2*Math.PI*44;
      el.style.strokeDashoffset=circ-(circ*v/100);
    });
  });
}

// ── GAUGE SVG ────────────────────────────────────────────────────────────────

function gauge(value, size=100, color='var(--neon)') {
  const r=44, circ=2*Math.PI*r;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" class="transform -rotate-90">
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="6"/>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
      class="gauge-ring" data-value="${value}"/>
  </svg>`;
}

// ── CONFIDENCE COLOR ─────────────────────────────────────────────────────────

function confColor(v){ return v>=75?'var(--neon)':v>=60?'#ffa500':'var(--magenta)'; }
function confClass(v){ return v>=75?'high':v>=60?'med':'low'; }

        ${g.isFinal?`<div class="px-4 py-2 rounded font-bold text-[10px] uppercase tracking-widest ${g.mlRes==='win'?'bg-neon/10 text-neon border border-neon/30':'bg-magenta/10 text-magenta border border-magenta/30'}">${g.mlRes==='win'?'CORRECT':'MISS'}</div>`:''}
      </div>
    </div>
  </section>`;
}

function renderPickCard(g, idx) {
  const delay = Math.min(idx, 6);
  const t1Picked=norm(g.mlPick)===norm(g.t1);
  const opp = t1Picked?g.t2:g.t1;
  const oppSeed = t1Picked?g.s2:g.s1;
  const pickSeed = t1Picked?g.s1:g.s2;
  let statusBadge = '';
  if(g.isFinal) statusBadge=g.mlRes==='win'
    ?'<span class="px-2 py-0.5 bg-neon/10 text-neon text-[8px] font-bold rounded uppercase">W</span>'
    :'<span class="px-2 py-0.5 bg-magenta/10 text-magenta text-[8px] font-bold rounded uppercase">L</span>';
  else if(g.isLive) statusBadge='<span class="px-2 py-0.5 bg-yellow-500/10 text-yellow-400 text-[8px] font-bold rounded uppercase flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-yellow-400 animate-pulse"></span>LIVE</span>';

  return `
  <div class="glass rounded-lg p-4 card-lift fade-up fade-up-delay-${delay} ${g.isFinal?(g.mlRes==='win'?'border-l-2 border-neon':'border-l-2 border-magenta'):'border-l-2 border-white/10'}">
    <div class="flex items-start gap-3 mb-3">
      <div class="mt-1 shrink-0">${teamLogo(g.mlPick, 32)}</div>
      <div class="flex-1 min-w-0">

          <span class="text-[9px] font-bold text-zinc-600 uppercase">${g.region||''} &middot; ${g.rk}</span>

        <div class="font-display font-bold text-base leading-tight truncate">${g.mlPick}</div>

      </div>
      <div class="text-right shrink-0">
        <div class="text-lg font-display font-bold" style="color:${confColor(g.mlConf)}">${g.mlConf.toFixed(0)}%</div>
        ${g.spread?`<div class="text-[9px] text-zinc-500 font-bold">${g.spread}</div>`:''}

      <span class="text-zinc-600">-</span>
      <div class="flex items-center gap-1.5"><span class="text-zinc-500">${g.sc2} ${g.t2} ${g.s2}</span>${teamLogo(g.t2,16)}</div>
    </div>`:''}
  </div>`;
}

function renderResultRow(g) {

    <div class="w-7 h-7 rounded flex items-center justify-center text-[10px] font-bold shrink-0 ${w?'bg-neon/10 text-neon':'bg-magenta/10 text-magenta'}">${w?'W':'L'}</div>
    <div class="flex items-center gap-2 shrink-0">
      ${teamLogo(g.t1, 22)}
      <span class="text-xs font-bold text-zinc-400">${g.sc1}</span>

      <span class="text-xs font-bold text-zinc-400">${g.sc2}</span>

    </div>
    <div class="flex-1 min-w-0">

      <div class="text-[10px] text-zinc-500">${g.region||''} &middot; ${ROUND_LABELS[g.rk]||g.rk}</div>
    </div>
    <div class="text-right shrink-0">

      <div class="text-[10px] text-zinc-500">${g.mlConf.toFixed(0)}% conf</div>
    </div>

}

function renderConfDistribution(gg) {
  const buckets = [{l:'90-100%',lo:90,hi:100},{l:'80-89%',lo:80,hi:90},{l:'70-79%',lo:70,hi:80},{l:'60-69%',lo:60,hi:70},{l:'50-59%',lo:50,hi:60},{l:'<50%',lo:0,hi:50}];
  const withConf=gg.filter(g=>g.mlConf>0);
  const max=Math.max(...buckets.map(b=>withConf.filter(g=>g.mlConf>=b.lo&&g.mlConf<b.hi).length),1);
  return `<div class="space-y-2">${buckets.map(b=>{
    const count=withConf.filter(g=>g.mlConf>=b.lo&&g.mlConf<b.hi).length;
    const w=count/max*100;
    const wins=withConf.filter(g=>g.mlConf>=b.lo&&g.mlConf<b.hi&&g.mlRes==='win').length;
    const losses=withConf.filter(g=>g.mlConf>=b.lo&&g.mlConf<b.hi&&g.mlRes==='loss').length;
    return `<div class="flex items-center gap-2">
      <span class="text-[9px] font-bold text-zinc-500 w-14 shrink-0">${b.l}</span>
      <div class="flex-1 h-5 bg-white/5 rounded overflow-hidden relative">
        <div class="h-full rounded transition-all duration-700" style="width:${w}%;background:${b.lo>=70?'var(--neon)':b.lo>=50?'#ffa500':'var(--magenta)'};opacity:0.4"></div>
        <span class="absolute inset-0 flex items-center justify-center text-[9px] font-bold">${count}${wins+losses>0?` (${wins}W-${losses}L)`:''}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function setRoundFilter(rk) { S.roundFilter=rk; render(); }
function filterByRound(gg) { return S.roundFilter==='ALL'?gg:gg.filter(g=>g.rk===S.roundFilter); }

// VIEW: BRACKET

function renderBracket() {
  const gg = games();

  // Organise by region+round
  const byRR = {};
  gg.forEach(g => {
    const k = (g.region||'') + '|' + g.rk;
    if (!byRR[k]) byRR[k] = [];
    byRR[k].push(g);
  });

  // Official 2026 layout:
  //   LEFT side:  South (top) + West (bottom)
  //   RIGHT side: East (top)  + Midwest (bottom)
  // Rounds left→right on left side: R64 R32 S16 E8
  // Rounds right→left on right side: E8 S16 R32 R64
  const LEFT_REGIONS  = ['South','West'];
  const RIGHT_REGIONS = ['East','Midwest'];
  const LEFT_ROUNDS   = ['R64','R32','S16','E8'];
  const RIGHT_ROUNDS  = ['E8','S16','R32','R64'];
  const ROUND_HDR = {
    R64:'First Round', R32:'Second Round', S16:'Sweet 16', E8:'Elite 8',
    FF:'Semifinals', CHAMP:'Championship'
  };
  const ROUND_DATE = {
    R64:'March 19-20', R32:'March 21-22', S16:'March 26-27',
    E8:'March 28-29', FF:'April 4', CHAMP:'April 6'
  };

  // Check if we have any data
  const hasData = gg.length > 0;

  // ── single matchup slot ──────────────────────────────────────────────────
  function slot(g, side) {
    if (!g) return `<div class="b-slot b-slot-empty"><div class="b-team"><span class="b-seed"></span><span class="b-name text-zinc-700">TBD</span></div><div class="b-team"><span class="b-seed"></span><span class="b-name text-zinc-700">TBD</span></div></div>`;

    const wn = g.winner ? norm(g.winner) : '';
    function teamCls(t) {
      const picked = norm(g.mlPick) === norm(t);
      const won    = wn === norm(t);
      if (!g.isFinal) return picked ? 'b-picked' : '';
      if (picked && won)  return 'b-correct';
      if (picked && !won) return 'b-wrong';
      if (won)            return 'b-winner';
      return 'b-loser';
    }
    function scoreStr(sc, t) {
      return g.isFinal ? `<span class="b-score ${norm(g.winner||'')==norm(t)?'b-score-hi':''}">${sc}</span>` : '';
    }
    const isPick1 = norm(g.mlPick) === norm(g.t1);
    const isPick2 = norm(g.mlPick) === norm(g.t2);

    return `<div class="b-slot">
      <div class="b-team ${teamCls(g.t1)}">
        <span class="b-seed">${g.s1||''}</span>
        ${teamLogo(g.t1,14)}
        <span class="b-name">${g.t1||'TBD'}</span>
        ${isPick1?'<span class="b-pick-dot"></span>':''}
        ${scoreStr(g.sc1,g.t1)}
      </div>
      <div class="b-team ${teamCls(g.t2)}">
        <span class="b-seed">${g.s2||''}</span>
        ${teamLogo(g.t2,14)}
        <span class="b-name">${g.t2||'TBD'}</span>
        ${isPick2?'<span class="b-pick-dot"></span>':''}
        ${scoreStr(g.sc2,g.t2)}
      </div>
    </div>`;
  }

  // ── one round column ─────────────────────────────────────────────────────
  function roundCol(region, rk, align) {
    const gs = byRR[region+'|'+rk] || [];
    // Pad to expected count so spacing stays consistent even with missing data
    const expected = {R64:8,R32:4,S16:2,E8:1}[rk] || 1;
    const padded   = Array.from({length:expected}, (_,i) => gs[i]||null);

    // Vertical gap multiplier doubles each round so games align with their pairs
    const gapMult  = {R64:1,R32:2,S16:4,E8:8}[rk] || 1;
    const slotH    = 56; // px — base slot height at R64
    const halfGap  = ((gapMult-1) * slotH) / 2;
    const fullGap  = (gapMult-1) * slotH;

    const slots = padded.map((g,i) => {
      const mt = i===0 ? halfGap : fullGap;
      return `<div style="margin-top:${mt}px">${slot(g, align)}</div>`;
    }).join('');

    return `<div class="b-round-col">
      <div class="b-round-hdr" style="text-align:${align};">
        <div class="b-round-name">${ROUND_HDR[rk]||rk}</div>
        <div class="b-round-date">${ROUND_DATE[rk]||''}</div>
      </div>
      <div class="b-slots">${slots}</div>
    </div>`;
  }

  // ── one half (left or right) containing two regions ──────────────────────
  function half(regions, rounds, align) {
    return regions.map(region => {
      const cols = rounds.map(rk => roundCol(region, rk, align)).join('');
      return `<div class="b-region-block">
        <div class="b-region-label" style="text-align:${align}">${region.toUpperCase()}</div>
        <div class="b-half-cols" style="flex-direction:row">${cols}</div>
      </div>`;
    }).join('');
  }

  // ── Final Four center ────────────────────────────────────────────────────
  function ffSlot(g) {
    if (!g) return `<div class="b-slot b-ff-slot"><div class="b-team"><span class="b-seed"></span><span class="b-name text-zinc-600">TBD</span></div><div class="b-team"><span class="b-seed"></span><span class="b-name text-zinc-600">TBD</span></div></div>`;
    return slot(g, 'center');
  }

  const ffGames   = gg.filter(g => g.rk === 'FF');
  const champGame = gg.filter(g => g.rk === 'CHAMP');
  const ff1 = ffGames[0]||null, ff2 = ffGames[1]||null;
  const champ = champGame[0]||null;

  // Champion display
  function champBox() {
    if (!champ) return `<div class="b-champ-box"><div class="b-champ-trophy">🏆</div><div class="b-champ-label">Champion</div><div class="b-champ-name text-zinc-600">TBD</div><div class="b-champ-sub">April 6 · Indianapolis</div></div>`;
    const pick = champ.mlPick||'TBD';
    const conf = champ.mlConf>0?champ.mlConf.toFixed(0)+'%':'';
    const won  = champ.isFinal && norm(champ.winner)===norm(pick);
    const lost = champ.isFinal && norm(champ.winner)!==norm(pick);
    return `<div class="b-champ-box ${won?'b-champ-win':lost?'b-champ-loss':''}">
      <div class="b-champ-trophy">🏆</div>
      <div class="b-champ-label">${champ.isFinal?'Champion':'Predicted Champion'}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;">
        ${teamLogo(pick,28)}
        <div class="b-champ-name ${won?'text-neon':lost?'text-magenta':''}">${pick}</div>
      </div>
      ${conf?`<div class="b-champ-conf">${conf} confidence</div>`:''}
      ${champ.isFinal?`<div style="font-size:10px;color:#666;margin-top:2px;">${champ.sc1}–${champ.sc2}</div>`:''}
      <div class="b-champ-sub">April 6 · Indianapolis</div>
    </div>`;
  }

  const centerCol = `<div class="b-center">
    <div class="b-ff-label">National<br>Semifinals</div>
    <div style="margin-bottom:8px">${ffSlot(ff1)}</div>
    ${champBox()}
    <div style="margin-top:8px">${ffSlot(ff2)}</div>
    <div class="b-ff-label">National<br>Semifinals</div>
  </div>`;

  // Split regions individually for grid layout
  const leftTop     = half(['South'],   LEFT_ROUNDS,  'left');
  const leftBottom  = half(['West'],    LEFT_ROUNDS,  'left');
  const rightTop    = half(['East'],    RIGHT_ROUNDS, 'right');
  const rightBottom = half(['Midwest'], RIGHT_ROUNDS, 'right');
  // ── bracket CSS ──────────────────────────────────────────────────────────
  const css = `<style>
  .b-wrap { overflow-x:auto; overflow-y:visible; padding-bottom:2rem; }
  .b-header { font-family:'Clash Display',sans-serif; font-size:13px; letter-spacing:3px; text-align:center;
    color:#444; text-transform:uppercase; padding:8px 0 12px; border-bottom:1px solid rgba(0,255,65,0.15);
    margin-bottom:16px; }
  .b-layout {
    display: grid;
    grid-template-columns: 1fr 160px 1fr;
    grid-template-rows: auto auto;
    gap: 0;
    min-width: 1100px;
    align-items: start;
  }
  .b-layout-left-top    { grid-column: 1; grid-row: 1; }
  .b-layout-left-bottom { grid-column: 1; grid-row: 2; }
  .b-layout-center      { grid-column: 2; grid-row: 1 / 3; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding-top:40px; }
  .b-layout-right-top   { grid-column: 3; grid-row: 1; }
  .b-layout-right-bottom{ grid-column: 3; grid-row: 2; }
  .b-region-block { display:flex; flex-direction:column; }
  .b-region-label { font-family:'Clash Display',sans-serif; font-size:10px; letter-spacing:3px;
    color:var(--neon); padding:0 4px 6px; }
  .b-half-cols { display:flex; gap:2px; align-items:flex-start; }
  .b-round-col { display:flex; flex-direction:column; width:130px; flex-shrink:0; }
  .b-round-hdr { padding:0 4px 8px; }
  .b-round-name { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:#555; }
  .b-round-date { font-size:7px; color:#3a3a3a; margin-top:1px; letter-spacing:0.5px; }
  .b-slots { display:flex; flex-direction:column; }
  .b-slot { border:1px solid rgba(255,255,255,0.06); border-radius:3px; background:rgba(14,14,14,0.8);
    overflow:hidden; margin:1px 3px; }
  .b-slot-empty { opacity:0.3; }
  .b-ff-slot { min-width:140px; }
  .b-team { display:flex; align-items:center; gap:4px; padding:4px 6px; height:26px;
    border-bottom:1px solid rgba(255,255,255,0.04); font-size:10px; transition:background 0.1s; }
  .b-team:last-child { border-bottom:none; }
  .b-seed { font-size:8px; color:#444; min-width:12px; text-align:right; font-family:monospace; flex-shrink:0; }
  .b-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#888; font-size:9.5px; }
  .b-score { font-family:'Clash Display',sans-serif; font-size:12px; color:#555; margin-left:auto; padding-left:4px; flex-shrink:0; }
  .b-score-hi { color:#fff; }
  .b-pick-dot { width:4px; height:4px; border-radius:50%; background:var(--neon); flex-shrink:0; }
  /* result states */

  .b-wrong .b-name { color:var(--magenta); }

  .b-loser .b-name { color:#333; }
  .b-picked .b-name { color:var(--neon); }
  .b-picked { background:rgba(0,255,65,0.04); }
  /* FF + champ */
  .b-ff-label { font-family:'Clash Display',sans-serif; font-size:9px; letter-spacing:2px;
    color:var(--neon); text-align:center; padding:8px 0 4px; text-transform:uppercase; line-height:1.3; }
  .b-champ-box { background:linear-gradient(135deg,rgba(0,255,65,0.05),rgba(0,0,0,0));
    border:1px solid rgba(0,255,65,0.2); border-radius:6px; padding:14px 16px; text-align:center;
    min-width:140px; margin:6px 0; }

function renderScores() {
  const gg=games();
  const s=stats(gg);
  const live=gg.filter(g=>g.isLive);
  const done=gg.filter(g=>g.isFinal).reverse();
  const upcoming=gg.filter(g=>g.isPending);

  let html=`<div class="space-y-6 fade-up">
    <div class="flex items-center justify-between">
      <h2 class="text-2xl font-display font-bold flex items-center gap-3">
        <iconify-icon icon="lucide:activity" class="text-neon"></iconify-icon>
        Live Scores & Results
      </h2>
    </div>

    <!-- Summary -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="glass rounded-lg p-4 text-center border-t-2 border-neon">
        <div class="text-2xl font-display font-bold text-neon">${s.mw}-${s.ml}</div>
        <div class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">ML Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center">
        <div class="text-2xl font-display font-bold">${s.pctW>0?s.pctW.toFixed(1)+'%':'--'}</div>
        <div class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Win Rate</div>
      </div>
      <div class="glass rounded-lg p-4 text-center">
        <div class="text-2xl font-display font-bold">${s.aw}-${s.al}</div>
        <div class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">ATS Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center">
        <div class="text-2xl font-display font-bold">${s.total}</div>
        <div class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest">Total Games</div>
      </div>
    </div>`;

  // Live
  if(live.length>0){
    html+=`<div class="space-y-3"><h3 class="text-sm font-bold uppercase tracking-widest text-yellow-400 flex items-center gap-2">
      <span class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></span>Live Now (${live.length})</h3>`;
    live.forEach(g=>{ html+=scoreCard(g); });
    html+=`</div>`;
  }

  // Completed by round
  ROUND_ORDER.slice().reverse().forEach(rk=>{
    const rGames=done.filter(g=>g.rk===rk);
    if(!rGames.length) return;
    const w=rGames.filter(g=>g.mlRes==='win').length;
    const l=rGames.filter(g=>g.mlRes==='loss').length;
    html+=`<div class="space-y-3">
      <div class="flex items-center justify-between border-b border-white/5 pb-2">
        <h3 class="text-sm font-display font-bold uppercase tracking-wider">${ROUND_LABELS[rk]||rk}</h3>
        <span class="text-[10px] font-bold ${w>l?'text-neon':'text-magenta'}">${w}-${l}</span>
      </div>`;
    rGames.forEach(g=>{ html+=scoreCard(g); });
    html+=`</div>`;
  });

  // Upcoming
  if(upcoming.length>0){
    html+=`<div class="space-y-3"><h3 class="text-sm font-bold uppercase tracking-widest text-zinc-500">Upcoming (${upcoming.length})</h3>`;
    upcoming.slice(0,12).forEach(g=>{ html+=scoreCard(g); });
    html+=`</div>`;
  }

  html+=`</div>`;
  return html;
}

  const t2Win=g.isFinal&&g.sc2>g.sc1;

  const mlL=g.isFinal&&g.mlRes==='loss';

  return `
  <div class="glass rounded-lg overflow-hidden card-lift ${g.isFinal?(mlW?'border-l-2 border-neon':'border-l-2 border-magenta'):g.isLive?'border-l-2 border-yellow-400':''}">
    <div class="p-4">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2 text-[9px] font-bold text-zinc-500 uppercase tracking-widest">

        </div>
        ${g.isLive?'<span class="flex items-center gap-1 text-[9px] font-bold text-yellow-400"><span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></span>LIVE</span>'
        :g.isFinal?`<span class="text-[9px] font-bold ${mlW?'text-neon':'text-magenta'}">${mlW?'MODEL CORRECT':'MODEL MISS'}</span>`
        :`<span class="text-[9px] text-zinc-600">${g.time||'TBD'}</span>`}
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            ${teamLogo(g.t1, 24)}
            <span class="text-[10px] text-zinc-600 font-bold">${g.s1}</span>
            <span class="font-bold ${t1Win?'text-white':g.isFinal?'text-zinc-600':'text-zinc-300'} ${norm(g.mlPick)===norm(g.t1)?'text-neon':''}">${g.t1}</span>
            ${norm(g.mlPick)===norm(g.t1)?'<iconify-icon icon="lucide:chevron-left" class="text-neon text-[10px]"></iconify-icon>':''}
          </div>
          <span class="font-display font-bold text-lg ${t1Win?'text-white':'text-zinc-600'}">${g.isFinal||g.isLive?g.sc1:''}</span>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            ${teamLogo(g.t2, 24)}
            <span class="text-[10px] text-zinc-600 font-bold">${g.s2}</span>
            <span class="font-bold ${t2Win?'text-white':g.isFinal?'text-zinc-600':'text-zinc-300'} ${norm(g.mlPick)===norm(g.t2)?'text-neon':''}">${g.t2}</span>
            ${norm(g.mlPick)===norm(g.t2)?'<iconify-icon icon="lucide:chevron-left" class="text-neon text-[10px]"></iconify-icon>':''}
          </div>
          <span class="font-display font-bold text-lg ${t2Win?'text-white':'text-zinc-600'}">${g.isFinal||g.isLive?g.sc2:''}</span>
        </div>
      </div>
    </div>
    <div class="border-t border-white/5 px-4 py-2.5 flex items-center gap-3 bg-white/[0.02] flex-wrap">
      <div class="flex-1 flex items-center gap-2 min-w-0">
        <span class="text-[8px] text-zinc-600 font-bold uppercase shrink-0">ML Pick</span>
        ${teamLogo(g.mlPick, 16)}

function renderUpsets() {
  const gg = games();

  // An upset pick = model picks the higher seed (worse team) to win
  const upsets = gg.filter(g => g.mlPick && g.s1 > 0 && g.s2 > 0 && g.isUpset);

  // Sort: pending first (upcoming upsets to watch), then by seed gap descending (biggest upset calls)
  upsets.sort((a,b) => {
    if (a.isPending !== b.isPending) return a.isPending ? -1 : 1;
    return (b.pickSeed - b.oppSeed) - (a.pickSeed - a.oppSeed);
  });

  // Stats
  const done   = upsets.filter(u => u.isFinal);
  const won    = done.filter(u => u.mlRes === 'win');
  const lost   = done.filter(u => u.mlRes === 'loss');
  const pending= upsets.filter(u => u.isPending || u.isLive);
  const biggest= done.filter(u => u.mlRes==='win').sort((a,b)=>(b.pickSeed-b.oppSeed)-(a.pickSeed-a.oppSeed));

  // Seed difference buckets
  const brackets = [
    { label: '1-seed killers',  min: 7, desc: '8-16 over 1-9 seeds' },
    { label: 'Mid-major magic', min: 4, max: 6, desc: '10-13 seeds' },
    { label: 'Minor upsets',    min: 1, max: 3, desc: '9-11 over 6-8 seeds' },
  ];

  function seedDiff(u) { return u.pickSeed - u.oppSeed; }

  function upsetCard(u) {
    const sd = seedDiff(u);
    const oddsColor = u.mlOdds && u.mlOdds.startsWith('+') ? '#f97316' : '#f97316';
    const resultDot = u.isFinal
      ? (u.mlRes==='win'
          ? `<span class="flex items-center gap-1 text-[9px] font-bold uppercase" style="color:var(--neon)"><span class="w-1.5 h-1.5 rounded-full bg-neon inline-block"></span>Hit</span>`
          : `<span class="flex items-center gap-1 text-[9px] font-bold uppercase" style="color:var(--magenta)"><span class="w-1.5 h-1.5 rounded-full bg-magenta inline-block" style="background:var(--magenta)"></span>Miss</span>`)
      : u.isLive
      ? `<span class="flex items-center gap-1 text-[9px] font-bold uppercase text-yellow-400"><span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse inline-block"></span>Live</span>`
      : `<span class="text-[9px] font-bold uppercase text-zinc-600">Upcoming</span>`;

    const borderColor = u.isFinal
      ? (u.mlRes==='win' ? 'border-neon' : 'border-magenta')
      : 'border-red-500/40';

    const scoreLine = u.isFinal
      ? `<div class="mt-2 pt-2 border-t border-white/5 flex items-center justify-between text-[11px]">
          <span class="text-zinc-500">${u.s1} ${u.t1} <span class="font-bold ${u.sc1>u.sc2?'text-white':'text-zinc-600'}">${u.sc1}</span></span>
          <span class="text-zinc-700 text-[9px]">FINAL</span>
          <span class="text-zinc-500"><span class="font-bold ${u.sc2>u.sc1?'text-white':'text-zinc-600'}">${u.sc2}</span> ${u.t2} ${u.s2}</span>
        </div>`
      : '';

    // Upset magnitude visual — number of seed slots
    const magnitude = Math.min(sd, 15);
    const bolts = Math.ceil(magnitude / 3); // 1-5 bolts

    const fav = u.mlPick === u.t1 ? u.t2 : u.t1;
    // ml_odds is the underdog's (our pick's) odds. Derive the favorite's odds by flipping.
    const favOdds = u.mlOdds ? (()=>{
      const o = parseInt(u.mlOdds.replace(/[^-\d]/g,''));
      if (!o) return null;
      // underdog implied prob → favorite implied prob = 1 - underdog_imp
      const dogImp = o > 0 ? 100/(o+100) : Math.abs(o)/(Math.abs(o)+100);
      const favImp = 1 - dogImp;
      // convert back to American odds (always negative for the favorite)
      return '-' + Math.round(favImp/(1-favImp)*100);
    })() : null;
    const imp = u.mlOdds ? (()=>{ const o=parseInt(u.mlOdds.replace(/[^-\d]/g,'')); return o>0?Math.round(100/(o+100)*100):Math.round(Math.abs(o)/(Math.abs(o)+100)*100); })() : null;
    const edge = imp !== null ? u.mlConf.toFixed(0) - imp : null;

    return `<div class="glass rounded-lg p-4 card-lift border-l-2 ${borderColor}">
      <!-- Header row -->
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="text-[8px] font-bold uppercase tracking-widest text-zinc-500">${u.region} · ${ROUND_LABELS[u.rk]||u.rk}</span>
        </div>
        ${resultDot}
      </div>

      <!-- Matchup -->
      <div class="flex items-center justify-between gap-2 mb-3">
        <!-- Underdog (our pick) -->
        <div class="flex items-center gap-2 min-w-0">
          ${teamLogo(u.mlPick, 32)}
          <div class="min-w-0">
            <div class="font-display font-bold text-base leading-none text-red-400 truncate">${u.mlPick}</div>
            <div class="text-[10px] text-zinc-500 mt-0.5">#${u.pickSeed} seed · underdog</div>
          </div>
        </div>
        <div class="text-[10px] text-zinc-600 font-bold shrink-0">over</div>
        <!-- Favorite -->
        <div class="flex items-center gap-2 min-w-0 justify-end">
          <div class="min-w-0 text-right">
            <div class="font-display font-bold text-base leading-none text-zinc-400 truncate">${fav}</div>
            <div class="text-[10px] text-zinc-600 mt-0.5">#${u.oppSeed} seed · fav</div>
          </div>
          ${teamLogo(fav, 32)}
        </div>
      </div>

      <!-- Odds + Spread pills -->
      <div class="flex items-center gap-2 mb-3 flex-wrap">
        ${favOdds ? `<div class="flex flex-col items-center px-3 py-1.5 rounded" style="background:rgba(249,115,22,0.12);">
          <span class="font-display font-bold text-lg leading-none text-orange-400">${favOdds}</span>
          <span class="text-[8px] font-bold uppercase tracking-wider text-zinc-600 mt-0.5">${fav} odds</span>
        </div>` : ''}
        ${u.spread ? `<div class="flex flex-col items-center px-3 py-1.5 rounded bg-white/5">
          <span class="font-display font-bold text-lg leading-none text-blue-400">${u.spread}</span>
          <span class="text-[8px] font-bold uppercase tracking-wider text-zinc-600 mt-0.5">Spread</span>
        </div>` : ''}
        <div class="flex flex-col items-center px-3 py-1.5 rounded bg-white/5 ml-auto">
          <span class="font-display font-bold text-lg leading-none" style="color:${confColor(u.mlConf)}">${u.mlConf.toFixed(0)}%</span>
          <span class="text-[8px] font-bold uppercase tracking-wider text-zinc-600 mt-0.5">Model</span>
        </div>
        ${imp !== null ? `<div class="flex flex-col items-center px-3 py-1.5 rounded bg-white/5">
          <span class="font-display font-bold text-lg leading-none text-zinc-400">${imp}%</span>
          <span class="text-[8px] font-bold uppercase tracking-wider text-zinc-600 mt-0.5">Implied</span>
        </div>` : ''}
        ${edge !== null && edge > 0 ? `<div class="flex flex-col items-center px-3 py-1.5 rounded" style="background:rgba(0,255,65,0.08);">
          <span class="font-display font-bold text-lg leading-none text-neon">+${edge}%</span>
          <span class="text-[8px] font-bold uppercase tracking-wider text-zinc-600 mt-0.5">Edge</span>
        </div>` : ''}
      </div>

      <!-- Confidence bar -->
      <div class="conf-bar"><div class="conf-fill ${confClass(u.mlConf)}" data-width="${u.mlConf}" style="width:0%"></div></div>
      ${scoreLine}
    </div>`;
  }

  // Group by round for the "by round" section
  const byRound = {};
  ROUND_ORDER.forEach(rk => { byRound[rk] = upsets.filter(u => u.rk===rk); });

  const upsetRate = done.length > 0 ? Math.round(won.length/done.length*100) : null;

  let html = `<div class="space-y-10 fade-up">

    <!-- PAGE HEADER -->
    <div class="flex items-start justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-3xl font-display font-bold flex items-center gap-3">
          <iconify-icon icon="lucide:zap" class="text-red-400"></iconify-icon>
          Upset Picks
        </h2>
        <p class="text-sm text-zinc-500 mt-1">Games where the model backs the higher seed to pull off the upset</p>
      </div>
    </div>

    <!-- SUMMARY STRIP -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="glass rounded-lg p-4 text-center border-t-2 border-red-500">
        <div class="text-2xl font-display font-bold text-red-400">${upsets.length}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Total Upsets Called</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-neon">
        <div class="text-2xl font-display font-bold text-neon">${won.length}-${lost.length}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Hit / Miss Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-orange-400">
        <div class="text-2xl font-display font-bold text-orange-400">${upsetRate !== null ? upsetRate+'%' : '--'}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Upset Hit Rate</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-zinc-600">
        <div class="text-2xl font-display font-bold text-zinc-300">${pending.length}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Still Pending</div>
      </div>
    </div>

    ${pending.length > 0 ? `
    <!-- UPCOMING UPSETS — watch list -->
    <section class="space-y-4">
      <div class="flex items-center gap-3 pb-3 border-b border-white/5">
        <div class="w-1 h-7 rounded-full bg-red-500"></div>
        <div>
          <h3 class="text-xl font-display font-bold text-red-400">Watch List</h3>
          <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Pending upset calls</span>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        ${pending.map(upsetCard).join('')}
      </div>
    </section>` : ''}

    ${won.length > 0 ? `
    <!-- HITS — confirmed upsets -->
    <section class="space-y-4">
      <div class="flex items-center gap-3 pb-3 border-b border-white/5">
        <div class="w-1 h-7 rounded-full bg-neon"></div>
        <div>
          <h3 class="text-xl font-display font-bold">Upset Hits ✓</h3>
          <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">${won.length} called correctly</span>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        ${won.map(upsetCard).join('')}
      </div>
    </section>` : ''}

    ${lost.length > 0 ? `
    <!-- MISSES -->
    <section class="space-y-4">
      <div class="flex items-center gap-3 pb-3 border-b border-white/5">
        <div class="w-1 h-7 rounded-full" style="background:var(--magenta)"></div>
        <div>
          <h3 class="text-xl font-display font-bold text-zinc-400">Misses</h3>
          <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">${lost.length} didn't convert</span>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        ${lost.map(upsetCard).join('')}
      </div>
    </section>` : ''}

    ${upsets.length === 0 ? `
    <div class="glass rounded-xl p-16 text-center">
      <iconify-icon icon="lucide:zap-off" class="text-5xl text-zinc-700 mb-4"></iconify-icon>
      <h3 class="text-xl font-display font-bold text-zinc-400 mb-2">No Upset Picks Yet</h3>
      <p class="text-sm text-zinc-600">Upset calls will appear after the bracket is set on Selection Sunday.</p>
    </div>` : ''}

  </div>`;

  return html;
}

// VIEW: BEST BETS
// ═══════════════════════════════════════════════════════════════════════════════

function impliedPct(oddsStr) {
  if (!oddsStr) return null;
  const o = parseInt((oddsStr+'').replace(/[^-\d]/g,'')) || 0;
  if (o === 0) return null;
  if (o > 0) return 100 / (o + 100);
  return Math.abs(o) / (Math.abs(o) + 100);
}

function buildBestBets(gg) {
  // Returns { ml: [], spread: [], value: [] } per round
  const ML_THRESH = 62;    // min ml_confidence to show as best ML pick
  const ATS_THRESH = 58;   // min ats_confidence to show as best spread pick
  const EDGE_THRESH = 0.07; // min model-vs-market edge (7pp) for value bets

  const byRound = {};
  ROUND_ORDER.forEach(rk => { byRound[rk] = { ml:[], spread:[], value:[] }; });

  gg.forEach(g => {
    if (!g.mlPick) return;
    const rk = g.rk;
    if (!byRound[rk]) return;

    // ── ML best picks ──
    if (g.mlConf >= ML_THRESH) {
      byRound[rk].ml.push(g);
    }

    // ── Best spread picks ──
    if (g.atsConf >= ATS_THRESH && g.atsPick && g.spread) {
      byRound[rk].spread.push(g);
    }

    // ── Value bets (model vs market implied) ──
    const imp = impliedPct(g.mlOdds);
    if (imp !== null) {
      const edge = g.mlConf / 100 - imp;
      if (edge >= EDGE_THRESH) {
        byRound[rk].value.push({ ...g, imp: Math.round(imp * 100), edge: Math.round(edge * 100) });
      }
    }
  });

  // Sort each bucket
  ROUND_ORDER.forEach(rk => {
    byRound[rk].ml.sort((a,b) => b.mlConf - a.mlConf);
    byRound[rk].spread.sort((a,b) => b.atsConf - a.atsConf);
    byRound[rk].value.sort((a,b) => b.edge - a.edge);
  });

  return byRound;
}

function bbResultBadge(g, type) {
  const res = type === 'ml' ? g.mlRes : g.atsRes;
  if (res === 'win')  return `<span class="text-[8px] font-bold px-1.5 py-0.5 rounded uppercase" style="background:rgba(0,255,65,0.12);color:var(--neon)">W</span>`;
  if (res === 'loss') return `<span class="text-[8px] font-bold px-1.5 py-0.5 rounded uppercase" style="background:rgba(255,0,110,0.12);color:var(--magenta)">L</span>`;
  if (res === 'push') return `<span class="text-[8px] font-bold px-1.5 py-0.5 rounded uppercase bg-white/10 text-zinc-400">P</span>`;
  return `<span class="text-[8px] text-zinc-600 font-bold uppercase">TBD</span>`;
}

function renderBestBets() {
  const gg = games();
  const bets = buildBestBets(gg);

  // Overall summary stats across all rounds
  const allML    = ROUND_ORDER.flatMap(rk => bets[rk].ml);
  const allSpread= ROUND_ORDER.flatMap(rk => bets[rk].spread);
  const allValue = ROUND_ORDER.flatMap(rk => bets[rk].value);
  const mlW  = allML.filter(g=>g.mlRes==='win').length;
  const mlP  = allML.filter(g=>g.mlRes!=='pending').length;
  const atsW = allSpread.filter(g=>g.atsRes==='win').length;
  const atsP = allSpread.filter(g=>g.atsRes!=='pending'&&g.atsRes!=='push').length;
  const valW = allValue.filter(g=>g.mlRes==='win').length;
  const valP = allValue.filter(g=>g.mlRes!=='pending').length;
  const avgEdge = allValue.length ? Math.round(allValue.reduce((s,v)=>s+v.edge,0)/allValue.length) : 0;

  let html = `<div class="space-y-10 fade-up">

    <!-- PAGE HEADER -->
    <div class="flex items-start justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-3xl font-display font-bold flex items-center gap-3">
          <iconify-icon icon="lucide:star" class="text-yellow-400"></iconify-icon>
          Best Bets
        </h2>
        <p class="text-sm text-zinc-500 mt-1">Top picks by round — ML confidence, spread value, and market edge</p>
      </div>
    </div>

    <!-- SUMMARY STRIP -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="glass rounded-lg p-4 text-center border-t-2 border-neon">
        <div class="text-2xl font-display font-bold text-neon">${mlP>0?`${mlW}-${mlP-mlW}`:'--'}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">ML Picks Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-blue-400">
        <div class="text-2xl font-display font-bold text-blue-400">${atsP>0?`${atsW}-${atsP-atsW}`:'--'}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">ATS Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-orange-400">
        <div class="text-2xl font-display font-bold text-orange-400">${valP>0?`${valW}-${valP-valW}`:'--'}</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Value Bets Record</div>
      </div>
      <div class="glass rounded-lg p-4 text-center border-t-2 border-zinc-600">
        <div class="text-2xl font-display font-bold text-zinc-300">+${avgEdge}%</div>
        <div class="text-[9px] font-bold uppercase tracking-widest text-zinc-500 mt-1">Avg Edge</div>
      </div>
    </div>`;

  // One section per round that has any bets
  ROUND_ORDER.forEach(rk => {
    const rb = bets[rk];
    const anyBets = rb.ml.length || rb.spread.length || rb.value.length;
    if (!anyBets) return;

    const roundGames = gg.filter(g=>g.rk===rk);
    const roundDone  = roundGames.filter(g=>g.isFinal).length;

    html += `
    <section class="space-y-5">
      <!-- Round header -->
      <div class="flex items-center gap-4 pb-3 border-b border-white/5">
        <div class="w-1 h-7 rounded-full bg-neon"></div>
        <div>
          <h3 class="text-xl font-display font-bold">${ROUND_LABELS[rk]||rk}</h3>
          <span class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">${roundDone}/${roundGames.length} games complete</span>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- ── ML PICKS ── -->
        <div class="space-y-3">
          <div class="flex items-center gap-2 mb-1">
            <div class="w-2 h-2 rounded-full bg-neon"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-neon">Best ML Picks</span>
            <span class="text-[9px] text-zinc-600 ml-auto">≥62% conf</span>
          </div>
          ${rb.ml.length ? rb.ml.slice(0,4).map(mlBetCard).join('') : `<div class="glass rounded-lg p-6 text-center text-zinc-600 text-sm">No high-confidence picks this round</div>`}
        </div>

        <!-- ── SPREAD PICKS ── -->
        <div class="space-y-3">
          <div class="flex items-center gap-2 mb-1">
            <div class="w-2 h-2 rounded-full bg-blue-400"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-blue-400">Best Spread Picks</span>
            <span class="text-[9px] text-zinc-600 ml-auto">≥58% ATS conf</span>
          </div>
          ${rb.spread.length ? rb.spread.slice(0,4).map(spreadBetCard).join('') : `<div class="glass rounded-lg p-6 text-center text-zinc-600 text-sm">No qualified spread picks this round</div>`}
        </div>

        <!-- ── VALUE BETS ── -->
        <div class="space-y-3">
          <div class="flex items-center gap-2 mb-1">
            <div class="w-2 h-2 rounded-full bg-orange-400"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-orange-400">Value Bets</span>
            <span class="text-[9px] text-zinc-600 ml-auto">Model vs market ≥7%</span>
          </div>
          ${rb.value.length ? rb.value.slice(0,4).map(valueBetCard).join('') : `<div class="glass rounded-lg p-6 text-center text-zinc-600 text-sm">No value edges found this round</div>`}
        </div>

      </div>
    </section>`;
  });

  if (!ROUND_ORDER.some(rk=>bets[rk].ml.length||bets[rk].spread.length||bets[rk].value.length)) {
    html += `<div class="glass rounded-xl p-16 text-center">
      <iconify-icon icon="lucide:calendar" class="text-5xl text-zinc-700 mb-4"></iconify-icon>
      <h3 class="text-xl font-display font-bold text-zinc-400 mb-2">Bets Pending</h3>
      <p class="text-sm text-zinc-600">Best bets will populate once picks are loaded after Selection Sunday.</p>
    </div>`;
  }

  html += `</div>`;
  return html;
}
